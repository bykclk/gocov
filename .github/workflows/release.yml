name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os=${target%/*}; arch=${target#*/}
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath \
              -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "dist/gocov-$os-$arch$ext" ./cmd/gocov
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath \
              -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "dist/gocov-server-$os-$arch$ext" ./cmd/gocov-server
          done
          (cd dist && sha256sum * > checksums.txt)

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
